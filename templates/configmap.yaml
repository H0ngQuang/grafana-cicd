apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  grafana.ini: |
    [server]
    protocol = http
    http_port = 3000
    
    [security]
    admin_user = {{ .Values.adminUser }}
    
    [users]
    allow_sign_up = false
    
    [analytics]
    reporting_enabled = false
    check_for_updates = false
    
    [log]
    mode = console
    level = warn